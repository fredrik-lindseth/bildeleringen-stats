<!DOCTYPE html>
<html lang="nb">
<head>

  <title>Debug — Bildeleringen Stats</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #1a1d23; color: #e8eaef; }

    button { padding: 8px 16px; margin: 8px 4px 16px 0; cursor: pointer; }

  <pre id="output">Klikk en knapp...</pre>

  <script src="debug.js"></script>

</html>
